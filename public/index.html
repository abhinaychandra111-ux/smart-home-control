<!DOCTYPE html>
<html>

<head>
    <title>Smart Home Control</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= HEADER ================= -->

<div class="header">

    <div class="header-left"></div>

    <div class="header-center">
        Smart Home Control Panel
    </div>

    <div class="header-right">
        <button onclick="logout()">
            Logout
        </button>
    </div>

</div>


<!-- ================= ADD ROOM PANEL ================= -->

<div class="panel">

    <input type="text"
           id="newRoom"
           placeholder="New Room Name">

    <button onclick="addRoom()">
        Add Room
    </button>

</div>


<!-- ================= ROOM CONTAINER ================= -->

<div id="deviceContainer"
     class="container">
</div>


<!-- ================= SOCKET.IO ================= -->

<script src="/socket.io/socket.io.js"></script>


<script>

// ================= AUTH CHECK =================

if (!localStorage.getItem("token")) {

    window.location.href = "/login.html";
}


// ================= SOCKET CONNECTION =================

const socket = io({

    auth: {
        token: localStorage.getItem("token")
    }

});


// ================= INVALID TOKEN =================

socket.on("connect_error", () => {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

});


// ================= STORE DATA =================

let allDevices = [];

let allRooms = [];


// ================= RECEIVE DEVICES =================

socket.on("updateDevices", (devices) => {

    allDevices = devices;

    renderRooms();

});


// ================= RECEIVE ROOMS =================

socket.on("updateRooms", (rooms) => {

    allRooms = rooms.map(r => r.name);

    renderRooms();

});


// ================= RENDER ROOMS =================

function renderRooms() {

    const container =
        document.getElementById("deviceContainer");

    container.innerHTML = "";

    const rooms = {};

    // GROUP DEVICES BY ROOM

    allDevices.forEach(device => {

        if (!rooms[device.room]) {

            rooms[device.room] = [];

        }

        rooms[device.room].push(device);

    });


    // CREATE ROOM CARDS

    allRooms.forEach(room => {

        const roomDevices =
            rooms[room] || [];

        let onCount = 0;

        let offCount = 0;


        roomDevices.forEach(device => {

            if (device.status === "ON") {

                onCount++;

            } else {

                offCount++;
            }

        });


        container.innerHTML += `

            <div class="card"
                 onclick="openRoom('${room}')"
                 style="cursor:pointer;">

                <h2>🏠</h2>

                <h3>${room}</h3>

                <p>
                    Total Devices:
                    ${roomDevices.length}
                </p>

                <p class="status-on">
                    ON: ${onCount}
                </p>

                <p class="status-off">
                    OFF: ${offCount}
                </p>

            </div>

        `;

    });

}


// ================= ADD ROOM =================

function addRoom() {

    const room =
        document.getElementById("newRoom").value;

    if (!room) return;

    socket.emit("addRoom", room);

    document.getElementById("newRoom").value = "";

}


// ================= OPEN ROOM PAGE =================

function openRoom(room) {

    window.location.href =
        `/room.html?room=${room}`;

}


// ================= LOGOUT =================

function logout() {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

}

</script>

</body>
</html>
