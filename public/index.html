<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Smart Home Dashboard</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<div class="layout">

    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div>

            <h1 class="logo">

                ⚡ SmartHome

            </h1>

            <nav>

                <a class="active">

                    🏠 Dashboard

                </a>

                <a>

                    🛏 Rooms

                </a>

                <a>

                    📊 Analytics

                </a>

                <a>

                    ⚙ Settings

                </a>

                <a onclick="openAutomation()">

    🤖 Automations

</a>

            </nav>

        </div>


        <button class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </aside>



    <!-- ================= MAIN CONTENT ================= -->

    <main class="main-content">


        <!-- ================= TOPBAR ================= -->

        <div class="topbar">

            <div>

                <h2>

                    Smart Home Dashboard

                </h2>

                <p>

                    Control your rooms and smart devices

                </p>

            </div>


            <div class="top-right">

                🔔

            </div>

        </div>



        <!-- ================= STATS ================= -->

        <section class="stats-grid">

            <div class="stats-card glow-blue fade-in">

                <h3>Total Rooms</h3>

                <h1 id="roomCount">

                    0

                </h1>

            </div>


            <div class="stats-card glow-green fade-in">

                <h3>Devices ON</h3>

                <h1 id="onCount">

                    0

                </h1>

            </div>


            <div class="stats-card glow-red fade-in">

                <h3>Devices OFF</h3>

                <h1 id="offCount">

                    0

                </h1>

            </div>

        </section>



        <!-- ================= ADD ROOM ================= -->

        <div class="add-room-box glass-card fade-in">

            <input type="text"
                   id="newRoom"
                   placeholder="Add New Room">

            <button onclick="addRoom()">

                Add Room

            </button>

        </div>



        <!-- ================= ROOM GRID ================= -->

        <div id="deviceContainer"
             class="room-grid">

        </div>



        <!-- ================= CHART ================= -->

        <div class="glass-card chart-box fade-in">

            <canvas id="deviceChart"></canvas>

        </div>

    </main>

</div>



<!-- ================= SOCKET.IO ================= -->

<script src="/socket.io/socket.io.js"></script>


<!-- ================= CHART JS ================= -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



<script>

// ================= AUTH CHECK =================

if (!localStorage.getItem("token")) {

    window.location.href = "/login.html";
}



// ================= SOCKET =================

const socket = io({

    auth: {

        token: localStorage.getItem("token")

    }

});



// ================= INVALID TOKEN =================

socket.on("connect_error", () => {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

});



// ================= GLOBAL STORAGE =================

let allDevices = [];

let allRooms = [];

let deviceChart;



// ================= RECEIVE DEVICES =================

socket.on("updateDevices", (devices) => {

    allDevices = devices;

    renderRooms();

});



// ================= RECEIVE ROOMS =================

socket.on("updateRooms", (rooms) => {

    allRooms = rooms.map(r => r.name);

    renderRooms();

});



// ================= RENDER ROOMS =================

function renderRooms() {

    const container =
        document.getElementById("deviceContainer");

    container.innerHTML = "";


    const groupedRooms = {};

    let totalOn = 0;

    let totalOff = 0;



    // GROUP DEVICES

    allDevices.forEach(device => {

        if (!groupedRooms[device.room]) {

            groupedRooms[device.room] = [];

        }

        groupedRooms[device.room].push(device);


        if (device.status === "ON") {

            totalOn++;

        }

        else {

            totalOff++;

        }

    });



    // UPDATE STATS

    document.getElementById("roomCount").innerText =
        allRooms.length;

    document.getElementById("onCount").innerText =
        totalOn;

    document.getElementById("offCount").innerText =
        totalOff;



    // CREATE ROOM CARDS

    allRooms.forEach(room => {

        const roomDevices =
            groupedRooms[room] || [];

        let roomOnCount = 0;


        roomDevices.forEach(device => {

            if (device.status === "ON") {

                roomOnCount++;

            }

        });



        container.innerHTML += `

            <div class="room-card glass-card fade-in">

                <div onclick="openRoom('${room}')">

                    <div class="room-icon">

                        🏠

                    </div>

                    <h2>

                        ${room}

                    </h2>

                    <p>

                        ${roomDevices.length} Devices

                    </p>

                    <div class="room-bottom">

                        <span class="on-badge">

                            ${roomOnCount} ON

                        </span>

                    </div>

                </div>

                <br>

                <button class="delete-room-btn"
                        onclick="deleteRoom('${room}')">

                    Delete Room

                </button>

            </div>

        `;

    });



    // UPDATE CHART

    updateChart(totalOn, totalOff);

}



// ================= ADD ROOM =================

function addRoom() {

    const room =
        document.getElementById("newRoom").value;

    if (!room) return;

    socket.emit("addRoom", room);

    document.getElementById("newRoom").value = "";

}



// ================= DELETE ROOM =================

function deleteRoom(room) {

    const confirmDelete =
        confirm(`Delete ${room} room?`);

    if (!confirmDelete) return;

    socket.emit("deleteRoom", room);

}



// ================= OPEN ROOM =================

function openRoom(room) {

    window.location.href =
        `/room.html?room=${room}`;

}



// ================= LOGOUT =================

function logout() {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

}

function openAutomation() {

    window.location.href =
        "/automation.html";

}

// ================= CHART =================

function updateChart(onCount, offCount) {

    const ctx =
        document.getElementById("deviceChart");


    if (deviceChart) {

        deviceChart.destroy();

    }


    deviceChart = new Chart(ctx, {

        type: "doughnut",

        data: {

            labels: [

                "Devices ON",

                "Devices OFF"

            ],

            datasets: [{

                data: [

                    onCount,

                    offCount

                ],

                backgroundColor: [

                    "#00ff88",

                    "#ff5d5d"

                ],

                borderWidth: 0

            }]

        },

        options: {

            responsive: true,

            plugins: {

                legend: {

                    labels: {

                        color: "white",

                        font: {

                            size: 14

                        }

                    }

                }

            }

        }

    });

}
function renderLogs(logs) {

    const container =
      document.getElementById(
      "activityContainer"
    );

    container.innerHTML = "";


    logs.forEach(log => {

        container.innerHTML += `

            <div class="activity-item">

                <div>

                    <strong>

                        ${log.device}

                    </strong>

                    <p>

                        ${log.action}

                    </p>

                </div>

                <span>

                    ${log.time}

                </span>

            </div>

        `;

    });

}
<div class="glass-card
            activity-box fade-in">

    <h2>

        Recent Activity

    </h2>

    <div id="activityContainer">

    </div>

</div>

socket.on("updateLogs", (logs) => {

    renderLogs(logs);

});

</script>

</body>
</html>
