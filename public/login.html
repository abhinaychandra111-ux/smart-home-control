<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0">

    <title>SmartHome Login</title>

    <link rel="stylesheet"
          href="style.css">


    <!-- GOOGLE FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body class="auth-body">


<div class="auth-box fade-in">


    <!-- ================= LOGO ================= -->

    <h1 class="logo">

        ⚡ SmartHome

    </h1>


    <!-- ================= TITLE ================= -->

    <h2>

        Welcome Back

    </h2>

    <p class="auth-subtitle">

        Login to control your smart devices

    </p>



    <!-- ================= USERNAME ================= -->

    <input type="text"
           id="username"
           placeholder="Enter Username">



    <!-- ================= PASSWORD ================= -->

    <div class="password-box">

        <input type="password"
               id="password"
               placeholder="Enter Password">

        <span onclick="togglePassword()"
              class="eye-btn">

            👁

        </span>

    </div>



    <!-- ================= LOGIN BUTTON ================= -->

    <button id="loginBtn"
            onclick="login()">

        Login

    </button>



    <!-- ================= MESSAGE ================= -->

    <p id="message"
       class="error-text">

    </p>



    <!-- ================= REGISTER ================= -->

    <p class="bottom-text">

        Don't have an account?

        <a href="/register.html">

            Register

        </a>

    </p>

</div>



<script>

// ================= AUTO LOGIN ON ENTER =================

document.addEventListener(
"keypress",
function(event) {

    if (event.key === "Enter") {

        login();

    }

});



// ================= PASSWORD TOGGLE =================

function togglePassword() {

    const password =
        document.getElementById(
            "password"
        );


    password.type =

        password.type === "password"

        ? "text"

        : "password";

}



// ================= LOGIN =================

async function login() {

    const username =
        document.getElementById(
            "username"
        ).value.trim();


    const password =
        document.getElementById(
            "password"
        ).value.trim();


    const message =
        document.getElementById(
            "message"
        );


    const loginBtn =
        document.getElementById(
            "loginBtn"
        );



    // CLEAR MESSAGE

    message.innerText = "";



    // VALIDATION

    if (!username || !password) {

        message.innerText =
            "Fill all fields";

        return;

    }



    // LOADING STATE

    loginBtn.innerText =
        "Logging in...";

    loginBtn.disabled = true;



    try {

        const res =
            await fetch("/login", {

                method: "POST",

                headers: {

                    "Content-Type":
                    "application/json"

                },

                body: JSON.stringify({

                    username,

                    password

                })

            });


        const data =
            await res.json();



        // SUCCESS

        if (data.token) {

            localStorage.setItem(

                "token",

                data.token

            );


            window.location.href = "/";

        }


        // ERROR

        else {

            message.innerText =
                data.message ||
                "Login failed";

        }

    }

    catch (err) {

        message.innerText =
            "Server error";

    }



    // RESET BUTTON

    loginBtn.innerText =
        "Login";

    loginBtn.disabled = false;

}

</script>

</body>
</html>
