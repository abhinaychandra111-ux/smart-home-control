<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Room Devices</title>

    <link rel="stylesheet"
          href="style.css">

    <!-- GOOGLE FONT -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- FONT AWESOME -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="layout">


    <!-- ================= SIDEBAR ================= -->

    <aside class="sidebar">

        <div>

            <h1 class="logo">
                ⚡ SmartHome
            </h1>

            <nav>

                <a onclick="goBack()">

                    🏠 Dashboard

                </a>

                <a class="active">

                    🛏 Room Devices

                </a>

                <a>

                    📊 Analytics

                </a>

                <a>

                    ⚙ Settings

                </a>

            </nav>

        </div>


        <button class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </aside>



    <!-- ================= MAIN CONTENT ================= -->

    <main class="main-content">


        <!-- ================= TOPBAR ================= -->

        <div class="topbar">

            <div>

                <h2 id="roomTitle">

                    Room

                </h2>

                <p>

                    Manage all smart devices

                </p>

            </div>


            <div class="top-right">

                💡

            </div>

        </div>



        <!-- ================= ANALYTICS ================= -->

        <section class="stats-grid">

            <div class="stats-card glow-blue fade-in">

                <h3>Total Devices</h3>

                <h1 id="totalDevices">

                    0

                </h1>

            </div>


            <div class="stats-card glow-green fade-in">

                <h3>Devices ON</h3>

                <h1 id="onDevices">

                    0

                </h1>

            </div>


            <div class="stats-card glow-red fade-in">

                <h3>Devices OFF</h3>

                <h1 id="offDevices">

                    0

                </h1>

            </div>

        </section>



        <!-- ================= ADD DEVICE ================= -->

        <div class="add-room-box glass-card fade-in">

            <input type="text"
                   id="newDevice"
                   placeholder="Device Name">

            <select id="deviceType">

                <option value="light">

                    💡 Light

                </option>

                <option value="fan">

                    🌀 Fan

                </option>

                <option value="ac">

                    ❄ AC

                </option>

                <option value="tv">

                    📺 TV

                </option>

            </select>

            <button onclick="addDevice()">

                Add Device

            </button>

        </div>



        <!-- ================= DEVICE GRID ================= -->

        <div id="deviceContainer"
             class="room-grid">

        </div>

    </main>

</div>



<!-- ================= SOCKET.IO ================= -->

<script src="/socket.io/socket.io.js"></script>



<script>

// ================= AUTH CHECK =================

if (!localStorage.getItem("token")) {

    window.location.href = "/login.html";
}


// ================= ROOM PARAM =================

const params =
    new URLSearchParams(window.location.search);

const selectedRoom =
    params.get("room");


// ================= SET ROOM TITLE =================

document.getElementById("roomTitle").innerText =
    selectedRoom;


// ================= SOCKET =================

const socket = io({

    auth: {
        token: localStorage.getItem("token")
    }

});


// ================= INVALID TOKEN =================

socket.on("connect_error", () => {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

});


// ================= RECEIVE DEVICES =================

socket.on("updateDevices", (devices) => {

    const container =
        document.getElementById("deviceContainer");

    container.innerHTML = "";


    const roomDevices =
        devices.filter(device =>
            device.room === selectedRoom
        );


    // ================= ANALYTICS =================

    let total = roomDevices.length;

    let onCount = 0;

    let offCount = 0;


    roomDevices.forEach(device => {

        if (device.status === "ON") {

            onCount++;

        } else {

            offCount++;

        }

    });


    document.getElementById("totalDevices").innerText =
        total;

    document.getElementById("onDevices").innerText =
        onCount;

    document.getElementById("offDevices").innerText =
        offCount;



    // ================= DEVICE CARDS =================

    roomDevices.forEach(device => {

        let icon = "";


        if (device.type === "light") {

            icon =
            `<i class="fa-solid fa-lightbulb"></i>`;

        }


        if (device.type === "fan") {

            icon =
            `<i class="fa-solid fa-fan"></i>`;

        }


        if (device.type === "ac") {

            icon =
            `<i class="fa-solid fa-snowflake"></i>`;

        }


        if (device.type === "tv") {

            icon =
            `<i class="fa-solid fa-tv"></i>`;

        }


        const checked =
            device.status === "ON"
            ? "checked"
            : "";


        container.innerHTML += `

            <div class="room-card glass-card fade-in">

                <div class="room-icon">

                    ${icon}

                </div>

                <h2>

                    ${device.name}

                </h2>

                <p class="${
                    device.status === "ON"
                    ? "status-on"
                    : "status-off"
                }">

                    ${device.status}

                </p>


                <div class="room-bottom">

                    <!-- TOGGLE -->

                    <label class="switch">

                        <input type="checkbox"

                               ${checked}

                               onchange="toggleDevice('${device.name}')">

                        <span class="slider"></span>

                    </label>

                </div>

                <br>

                <!-- DELETE BUTTON -->

                <button onclick="deleteDevice('${device.name}')">

                    Delete

                </button>

            </div>

        `;

    });

});



// ================= ADD DEVICE =================

function addDevice() {

    const name =
        document.getElementById("newDevice").value;

    const type =
        document.getElementById("deviceType").value;


    if (!name) return;


    socket.emit("addDevice", {

        name,

        type,

        room: selectedRoom

    });


    document.getElementById("newDevice").value = "";

}



// ================= TOGGLE DEVICE =================

function toggleDevice(device) {

    socket.emit("toggleDevice", device);

}



// ================= DELETE DEVICE =================

function deleteDevice(device) {

    socket.emit("deleteDevice", device);

}



// ================= BACK =================

function goBack() {

    window.location.href = "/";

}



// ================= LOGOUT =================

function logout() {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

}

</script>

</body>
</html>
