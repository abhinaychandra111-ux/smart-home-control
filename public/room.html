<!DOCTYPE html>
<html>

<head>

    <title>Room Devices</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<div class="header">

    <div class="header-left">

        <button onclick="goBack()">
            Back
        </button>

    </div>

    <div class="header-center"
         id="roomTitle">

        Room

    </div>

    <div class="header-right"></div>

</div>


<!-- ================= ADD DEVICE PANEL ================= -->

<div class="panel">

    <input type="text"
           id="newDevice"
           placeholder="Device Name">

    <select id="deviceType">

        <option value="light">Light</option>

        <option value="fan">Fan</option>

        <option value="ac">AC</option>

        <option value="tv">TV</option>

    </select>

    <button onclick="addDevice()">

        Add Device

    </button>

</div>


<!-- ================= DEVICE CONTAINER ================= -->

<div id="deviceContainer"
     class="container">

</div>


<!-- ================= SOCKET.IO ================= -->

<script src="/socket.io/socket.io.js"></script>


<script>

// ================= AUTH CHECK =================

if (!localStorage.getItem("token")) {

    window.location.href = "/login.html";
}


// ================= GET ROOM NAME =================

const params =
    new URLSearchParams(window.location.search);

const selectedRoom =
    params.get("room");


// ================= SET ROOM TITLE =================

document.getElementById("roomTitle").innerText =
    selectedRoom;


// ================= SOCKET CONNECTION =================

const socket = io({

    auth: {
        token: localStorage.getItem("token")
    }

});


// ================= INVALID TOKEN =================

socket.on("connect_error", () => {

    localStorage.removeItem("token");

    window.location.href = "/login.html";

});


// ================= RECEIVE DEVICES =================

socket.on("updateDevices", (devices) => {

    const container =
        document.getElementById("deviceContainer");

    container.innerHTML = "";


    // FILTER ROOM DEVICES

    const roomDevices =
        devices.filter(device =>
            device.room === selectedRoom
        );


    // CREATE DEVICE CARDS

    roomDevices.forEach(device => {

        let icon = "🔌";

        if (device.type === "light")
            icon = "💡";

        if (device.type === "fan")
            icon = "🌀";

        if (device.type === "ac")
            icon = "❄️";

        if (device.type === "tv")
            icon = "📺";


        const checked =
            device.status === "ON"
            ? "checked"
            : "";


        container.innerHTML += `

            <div class="card">

                <h2>${icon}</h2>

                <h3>${device.name}</h3>

                <p class="${
                    device.status === "ON"
                    ? "status-on"
                    : "status-off"
                }">

                    ${device.status}

                </p>


                <!-- TOGGLE SWITCH -->

                <label class="switch">

                    <input type="checkbox"
                           ${checked}
                           onchange="toggleDevice('${device.name}')">

                    <span class="slider"></span>

                </label>

                <br><br>


                <!-- DELETE BUTTON -->

                <button onclick="deleteDevice('${device.name}')">

                    Delete

                </button>

            </div>

        `;

    });

});


// ================= ADD DEVICE =================

function addDevice() {

    const name =
        document.getElementById("newDevice").value;

    const type =
        document.getElementById("deviceType").value;


    if (!name) return;


    socket.emit("addDevice", {

        name,
        type,
        room: selectedRoom

    });


    document.getElementById("newDevice").value = "";

}


// ================= TOGGLE DEVICE =================

function toggleDevice(device) {

    socket.emit("toggleDevice", device);

}


// ================= DELETE DEVICE =================

function deleteDevice(device) {

    socket.emit("deleteDevice", device);

}


// ================= GO BACK =================

function goBack() {

    window.location.href = "/";

}

</script>

</body>
</html>
